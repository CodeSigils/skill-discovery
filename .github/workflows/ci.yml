name: validate

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'SECURITY.md'
      - '.agents/skills/skill-discovery'
      - 'skills/**/*.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'SECURITY.md'
      - '.agents/skills/skill-discovery'
      - 'skills/**/*.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install pyyaml
      - name: Check for Hermes-specific references
        run: python .github/scripts/ci-check.py
      - name: Validate docs frontmatter
        run: python .github/scripts/validate-docs.py
      - name: Verify marketplace URLs
        run: python .github/scripts/verify-marketplace-urls.py
